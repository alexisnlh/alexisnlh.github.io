<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 640px;
  background: #080b12;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  font-family: 'Georgia', serif;
  overflow: hidden;
  position: relative;
}

/* Grid background */
body::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 64px 64px;
}

/* Glow blobs */
.glow1 {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(34,211,200,0.13) 0%, transparent 70%);
  top: -100px; left: -100px;
}
.glow2 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
  bottom: -80px; right: -80px;
}

.content { position: relative; z-index: 1; text-align: center; }

.logo {
  font-size: 120px;
  font-weight: 700;
  letter-spacing: -4px;
  line-height: 1;
  margin-bottom: 32px;
}
.bracket { color: #22d3c8; }
.text-name { color: #e8eaf2; }
.slash { color: #7c3aed; }

.subtitle {
  font-family: 'Georgia', serif;
  font-size: 24px;
  color: #7a7f96;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.subtitle span { color: #e8eaf2; }

.line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, #22d3c8, #7c3aed);
  margin: 24px auto;
  border-radius: 2px;
}

/* Corner accents */
.corner {
  position: absolute;
  width: 40px; height: 40px;
  border-color: rgba(34,211,200,0.3);
  border-style: solid;
}
.corner.tl { top: 32px; left: 32px; border-width: 2px 0 0 2px; }
.corner.tr { top: 32px; right: 32px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 32px; left: 32px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 32px; right: 32px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="logo">
      <span class="bracket">&lt;</span><span class="text-name">anlh</span><span class="slash">/</span><span class="bracket">&gt;</span>
    </div>
    <div class="line"></div>
    <div class="subtitle"><span>Backend Engineer</span> &nbsp;+&nbsp; <span>Data Engineer</span></div>
  </div>
</body>
</html>
