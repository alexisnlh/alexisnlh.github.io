<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#121318"/>
    </linearGradient>
    <linearGradient id="teal4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="green4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0e7490;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Grid -->
  <g opacity="0.08">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#0e7490" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#0e7490" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f0f0f2" font-family="monospace" font-size="17" font-weight="bold">DSMARKET — SALES FORECASTING &amp; SUPPLY OPTIMIZATION</text>

  <!-- Left panel: City KPIs -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="165" height="140" rx="8" fill="#1a1b21" stroke="#0e7490" stroke-width="2"/>
    <text x="82" y="22" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11" font-weight="bold">CITIES</text>
    <!-- NY -->
    <rect x="10" y="32" width="145" height="28" rx="4" fill="#0a0a0b" stroke="#0e7490" stroke-width="1" stroke-opacity="0.5"/>
    <text x="20" y="50" fill="#f0f0f2" font-family="monospace" font-size="10">🗽 New York</text>
    <text x="145" y="50" text-anchor="end" fill="#06b6d4" font-family="monospace" font-size="10" font-weight="bold">NYC_1</text>
    <!-- Boston -->
    <rect x="10" y="66" width="145" height="28" rx="4" fill="#0a0a0b" stroke="#0e7490" stroke-width="1" stroke-opacity="0.5"/>
    <text x="20" y="84" fill="#f0f0f2" font-family="monospace" font-size="10">🏙 Boston</text>
    <text x="145" y="84" text-anchor="end" fill="#06b6d4" font-family="monospace" font-size="10" font-weight="bold">BOS_2</text>
    <!-- Philadelphia -->
    <rect x="10" y="100" width="145" height="28" rx="4" fill="#0a0a0b" stroke="#0e7490" stroke-width="1" stroke-opacity="0.5"/>
    <text x="20" y="118" fill="#f0f0f2" font-family="monospace" font-size="10">🏛 Philadelphia</text>
    <text x="145" y="118" text-anchor="end" fill="#06b6d4" font-family="monospace" font-size="10" font-weight="bold">PHI_3</text>
  </g>

  <!-- Center: Forecast chart -->
  <g transform="translate(210, 55)">
    <rect x="0" y="0" width="380" height="190" rx="8" fill="#1a1b21" stroke="#0e7490" stroke-width="2"/>
    <text x="190" y="22" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11" font-weight="bold">28-DAY SALES FORECAST</text>

    <!-- Chart axes -->
    <line x1="30" y1="160" x2="360" y2="160" stroke="#2e303a" stroke-width="1"/>
    <line x1="30" y1="40" x2="30" y2="160" stroke="#2e303a" stroke-width="1"/>

    <!-- Historical line (solid) -->
    <polyline points="30,140 60,125 90,132 120,110 150,118 180,100 210,108" fill="none" stroke="#0e7490" stroke-width="2.5"/>

    <!-- Forecast line (dashed) -->
    <polyline points="210,108 240,95 270,88 300,80 330,75 360,70" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Confidence band -->
    <polygon points="210,108 240,82 270,70 300,60 330,55 360,48 360,92 330,95 300,100 270,106 240,108 210,108" fill="#06b6d4" fill-opacity="0.1"/>

    <!-- Divider vertical -->
    <line x1="210" y1="40" x2="210" y2="160" stroke="#0e7490" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="120" y="175" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="9">Historical</text>
    <text x="290" y="175" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9">Forecast (+28d)</text>

    <!-- Data points -->
    <circle cx="30" cy="140" r="3" fill="#0e7490"/>
    <circle cx="60" cy="125" r="3" fill="#0e7490"/>
    <circle cx="90" cy="132" r="3" fill="#0e7490"/>
    <circle cx="120" cy="110" r="3" fill="#0e7490"/>
    <circle cx="150" cy="118" r="3" fill="#0e7490"/>
    <circle cx="180" cy="100" r="3" fill="#0e7490"/>
    <circle cx="210" cy="108" r="4" fill="#06b6d4"/>
  </g>

  <!-- Right panel: Models -->
  <g transform="translate(605, 60)">
    <rect x="0" y="0" width="165" height="155" rx="8" fill="#1a1b21" stroke="#10b981" stroke-width="2"/>
    <text x="82" y="22" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">MODELS</text>
    <text x="82" y="40" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="9">Ridge Regression</text>
    <text x="82" y="55" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="9">Random Forest</text>
    <text x="82" y="70" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="9">LightGBM</text>
    <text x="82" y="85" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="9">CatBoost</text>
    <text x="82" y="101" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">XGBoost ✓</text>
    <text x="82" y="115" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">(Selected)</text>
    <rect x="15" y="126" width="135" height="12" rx="3" fill="#0a0a0b" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
    <text x="82" y="136" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8">Optuna Tuning</text>
  </g>

  <!-- Bottom row: 3 metric cards + pipeline -->
  <!-- Metric: Records -->
  <g transform="translate(30, 258)">
    <rect x="0" y="0" width="120" height="82" rx="6" fill="#1a1b21" stroke="#0e7490" stroke-width="1.5"/>
    <text x="60" y="26" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="18" font-weight="bold">57.4M</text>
    <text x="60" y="42" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">registros de ventas</text>
    <text x="60" y="57" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">3,049 productos</text>
    <text x="60" y="71" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">10 tiendas · 3 ciudades</text>
  </g>

  <!-- Metric: RMSE improvement -->
  <g transform="translate(165, 258)">
    <rect x="0" y="0" width="120" height="82" rx="6" fill="#1a1b21" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="26" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold">13.1% mejor</text>
    <text x="60" y="44" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">error de predicción</text>
    <text x="60" y="58" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="8">vs. media móvil 28d</text>
    <text x="60" y="72" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="7">(RMSE 2.18 → 1.90)</text>
  </g>

  <!-- Metric: Clustering -->
  <g transform="translate(300, 258)">
    <rect x="0" y="0" width="120" height="82" rx="6" fill="#1a1b21" stroke="#0e7490" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9" font-weight="bold">SEGMENTACIÓN</text>
    <text x="60" y="32" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="8">Productos → 5 grupos</text>
    <text x="60" y="44" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="7">Silhouette: 0.2249</text>
    <text x="60" y="60" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="8">Tiendas → 3 zonas</text>
    <text x="60" y="72" text-anchor="middle" fill="#71717a" font-family="monospace" font-size="7">Silhouette: 0.2928</text>
  </g>

  <!-- Pipeline box -->
  <g transform="translate(440, 248)">
    <rect x="0" y="0" width="330" height="92" rx="8" fill="#1a1b21" stroke="#0e7490" stroke-width="1.5"/>
    <text x="165" y="16" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="10" font-weight="bold">END-TO-END PIPELINE</text>
    <text x="12" y="33" fill="#a1a1aa" font-family="monospace" font-size="8">① Ingesta datos</text>
    <text x="118" y="33" fill="#a1a1aa" font-family="monospace" font-size="8">→ ② Limpieza &amp; EDA</text>
    <text x="240" y="33" fill="#a1a1aa" font-family="monospace" font-size="8">→ ③ Features</text>
    <text x="12" y="50" fill="#a1a1aa" font-family="monospace" font-size="8">④ Segmentación</text>
    <text x="118" y="50" fill="#a1a1aa" font-family="monospace" font-size="8">→ ⑤ Entrenar modelos</text>
    <text x="240" y="50" fill="#a1a1aa" font-family="monospace" font-size="8">→ ⑥ Optuna</text>
    <text x="12" y="67" fill="#a1a1aa" font-family="monospace" font-size="8">⑦ Forecast 28d</text>
    <text x="118" y="67" fill="#a1a1aa" font-family="monospace" font-size="8">→ ⑧ Stock &amp; Reposición</text>
    <text x="255" y="67" fill="#34d399" font-family="monospace" font-size="8">→ ⑨ Power BI</text>
    <text x="165" y="84" text-anchor="middle" fill="#2e303a" font-family="monospace" font-size="7">ventas · precios · calendario de eventos especiales</text>
  </g>

  <!-- Bottom tag line -->
  <text x="400" y="418" text-anchor="middle" fill="#2e303a" font-family="monospace" font-size="10">Máster Data Science &amp; AI · Nuclio Digital School · 2025-2026</text>
</svg>
